<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Tasks</title>
  <style>
    /* ── TOKENS ─────────────────────────────────────────────────────────── */
    :root {
      /* light */
      --bg:          #f5f3ef;
      --surface:     #ffffff;
      --surface2:    #f0ede8;
      --border:      rgba(0,0,0,.08);
      --text:        #141210;
      --text2:       #6b6055;
      --text3:       #b0a898;
      --accent:      #e85d04;
      --accent-h:    #c94e00;
      --accent-bg:   rgba(232,93,4,.1);
      --accent-glow: rgba(232,93,4,.22);
      --green:       #1a9e5c;
      --green-bg:    rgba(26,158,92,.1);
      --green-glow:  rgba(26,158,92,.22);
      --danger:      #c0392b;
      --danger-bg:   rgba(192,57,43,.1);
      --done-text:   #c0b8ae;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.07), 0 2px 8px rgba(0,0,0,.05);
      --shadow:      0 4px 20px rgba(0,0,0,.1);
      --shadow-lg:   0 8px 40px rgba(0,0,0,.14);
      --r:    14px;
      --r-sm:  9px;
    }

    [data-theme="dark"] {
      --bg:          #080b09;
      --surface:     rgba(255,255,255,.038);
      --surface2:    rgba(255,255,255,.068);
      --border:      rgba(255,255,255,.075);
      --text:        #eef0ec;
      --text2:       #6a7a6d;
      --text3:       #2e3d30;
      --accent:      #ff6b2b;
      --accent-h:    #e85500;
      --accent-bg:   rgba(255,107,43,.13);
      --accent-glow: rgba(255,107,43,.28);
      --green:       #29d974;
      --green-bg:    rgba(41,217,116,.11);
      --green-glow:  rgba(41,217,116,.25);
      --danger:      #ff4d4d;
      --danger-bg:   rgba(255,77,77,.1);
      --done-text:   #2a3a2d;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.5);
      --shadow:      0 4px 24px rgba(0,0,0,.55);
      --shadow-lg:   0 12px 48px rgba(0,0,0,.65);
    }

    /* ── RESET ───────────────────────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    [hidden] { display: none !important; }

    /* ── BASE ────────────────────────────────────────────────────────────── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      transition: background .4s, color .3s;
    }

    /* ── DARK BG: dot grid + dual glow ─────────────────────────────────── */
    [data-theme="dark"] body {
      background-color: #080b09;
      background-image:
        radial-gradient(ellipse 55% 45% at  0%  0%, rgba(255,107,43,.10) 0%, transparent 65%),
        radial-gradient(ellipse 45% 50% at 100% 100%, rgba(41,217,116,.08) 0%, transparent 60%),
        radial-gradient(rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 26px 26px;
      background-attachment: fixed, fixed, fixed;
    }

    /* light bg: warm dot grid */
    [data-theme="light"] body {
      background-color: #f5f3ef;
      background-image:
        radial-gradient(ellipse 50% 40% at 0% 0%,   rgba(232,93,4,.06)  0%, transparent 60%),
        radial-gradient(ellipse 40% 45% at 100% 100%, rgba(26,158,92,.05) 0%, transparent 60%),
        radial-gradient(rgba(0,0,0,.06) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 26px 26px;
      background-attachment: fixed, fixed, fixed;
    }

    /* ── LAYOUT ──────────────────────────────────────────────────────────── */
    .app { max-width: 680px; margin: 0 auto; padding: 32px 16px 100px; }

    /* ── HEADER ──────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .header-left { display: flex; align-items: baseline; gap: 12px; }

    .logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.5px;
      background: linear-gradient(120deg, var(--accent) 0%, #ff9a55 45%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .date-display {
      font-size: 12px;
      color: var(--text2);
      font-weight: 500;
      letter-spacing: .03em;
      text-transform: uppercase;
    }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .stats { display: flex; gap: 6px; }
    .stat-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 600;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      backdrop-filter: blur(10px);
      letter-spacing: .02em;
    }
    .stat-badge.accent {
      background: var(--accent-bg);
      color: var(--accent);
      border-color: rgba(255,107,43,.2);
    }

    .btn-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
      backdrop-filter: blur(10px);
    }
    .btn-icon:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* ── MEETING PANEL ───────────────────────────────────────────────────── */
    .meeting-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 10px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      transition: border-color .2s, box-shadow .2s;
    }
    .meeting-panel:focus-within {
      border-color: rgba(255,107,43,.3);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .meeting-toggle-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      text-align: left;
      letter-spacing: .03em;
      text-transform: uppercase;
      transition: background .15s;
    }
    .meeting-toggle-btn:hover { background: var(--accent-bg); }
    .meeting-toggle-btn svg { flex-shrink: 0; }
    .meeting-toggle-btn .chevron { margin-left: auto; transition: transform .25s; color: var(--text3); }
    .meeting-toggle-btn.open .chevron { transform: rotate(180deg); }

    .meeting-form {
      border-top: 1px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: slideDown .2s ease;
    }

    .meeting-name-input,
    .meeting-actions-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .meeting-name-input { font-size: 14px; font-weight: 600; }
    .meeting-name-input::placeholder { color: var(--text3); font-weight: 400; }
    .meeting-name-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .meeting-actions-input { font-size: 13.5px; resize: vertical; min-height: 90px; }
    .meeting-actions-input::placeholder { color: var(--text3); }
    .meeting-actions-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .meeting-form-footer { display: flex; justify-content: flex-end; gap: 8px; }

    .btn-cancel {
      padding: 8px 16px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: none;
      color: var(--text2);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-cancel:hover { background: var(--surface2); }

    .btn-submit-meeting {
      padding: 8px 20px;
      border-radius: var(--r-sm);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: .05em;
      text-transform: uppercase;
      box-shadow: 0 2px 14px var(--accent-glow);
      transition: opacity .15s, transform .1s;
    }
    .btn-submit-meeting:hover { opacity: .88; }
    .btn-submit-meeting:active { transform: scale(.96); }

    /* ── ADD TASK ────────────────────────────────────────────────────────── */
    .add-task-wrap { display: flex; gap: 8px; margin-bottom: 16px; }

    .add-task-input {
      flex: 1;
      padding: 13px 18px;
      border-radius: var(--r);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      backdrop-filter: blur(20px);
      transition: border-color .2s, box-shadow .2s;
    }
    .add-task-input::placeholder { color: var(--text3); }
    .add-task-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-add {
      width: 48px; height: 48px;
      border-radius: var(--r);
      border: none;
      background: linear-gradient(135deg, var(--accent), #ff9a00);
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 18px var(--accent-glow);
      transition: opacity .15s, transform .12s, box-shadow .2s;
    }
    .btn-add:hover { opacity: .9; box-shadow: 0 6px 26px var(--accent-glow); }
    .btn-add:active { transform: scale(.92); }

    /* ── FILTERS ─────────────────────────────────────────────────────────── */
    .filters { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: .04em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all .15s;
    }
    .filter-btn:hover { color: var(--text); border-color: rgba(255,107,43,.3); }
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 2px 14px var(--accent-glow);
    }
    .filter-count {
      display: inline-block;
      padding: 0 5px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      margin-left: 4px;
      background: rgba(255,255,255,.22);
    }
    .filter-btn:not(.active) .filter-count { background: var(--surface2); color: var(--text3); }

    /* ── TASK LIST ───────────────────────────────────────────────────────── */
    .task-list { display: flex; flex-direction: column; gap: 6px; }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      backdrop-filter: blur(20px);
      transition: border-color .2s, box-shadow .2s, opacity .2s, transform .2s;
      animation: taskIn .22s cubic-bezier(.22,1,.36,1);
    }
    @keyframes taskIn {
      from { opacity: 0; transform: translateY(8px) scale(.985); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }
    .task-item.removing { animation: taskOut .18s ease forwards; }
    @keyframes taskOut {
      to { opacity: 0; transform: translateY(-5px) scale(.97); }
    }
    .task-item:hover {
      border-color: rgba(255,107,43,.22);
      box-shadow: 0 4px 24px rgba(255,107,43,.08);
    }
    .task-item.is-done { opacity: .4; }
    .task-item.is-snoozed {
      border-left: 2px solid var(--green);
      box-shadow: inset 4px 0 16px rgba(41,217,116,.05);
    }

    .task-main {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 14px;
    }

    /* ── CHECKBOX ────────────────────────────────────────────────────────── */
    .task-check {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 1.5px solid var(--text3);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: all .18s;
      color: transparent;
    }
    .task-check svg { width: 10px; height: 10px; }
    .task-check:hover {
      border-color: var(--green);
      color: var(--green);
      box-shadow: 0 0 0 3px var(--green-glow);
    }
    .is-done .task-check {
      background: var(--green);
      border-color: var(--green);
      color: #050a06;
      box-shadow: 0 0 10px var(--green-glow);
    }

    /* ── TASK BODY ───────────────────────────────────────────────────────── */
    .task-body { flex: 1; min-width: 0; }
    .task-top { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }

    .task-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
      line-height: 1.4;
    }
    .is-done .task-text { text-decoration: line-through; color: var(--done-text); }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .tag-meeting { background: var(--accent-bg); color: var(--accent); }
    .tag-snooze  { background: var(--green-bg);  color: var(--green);  }

    .task-meta {
      font-size: 10.5px;
      color: var(--text3);
      margin-top: 4px;
      letter-spacing: .03em;
      font-variant-numeric: tabular-nums;
    }

    /* ── TASK ACTIONS ────────────────────────────────────────────────────── */
    .task-actions {
      display: flex;
      align-items: center;
      gap: 1px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity .15s;
    }
    .task-item:hover .task-actions { opacity: 1; }

    .task-btn {
      width: 30px; height: 30px;
      border-radius: 7px;
      border: none;
      background: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text3);
      transition: all .15s;
    }
    .task-btn:hover        { background: var(--surface2); color: var(--text2); }
    .task-btn.delete:hover { background: var(--danger-bg); color: var(--danger); }
    .task-btn.snooze:hover { background: var(--green-bg);  color: var(--green);  }

    /* ── NOTES ───────────────────────────────────────────────────────────── */
    .task-notes-wrap {
      border-top: 1px solid var(--border);
      padding: 10px 14px 14px;
      animation: slideDown .15s ease;
    }
    .task-notes {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 9px 12px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      resize: vertical;
      min-height: 64px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .task-notes::placeholder { color: var(--text3); }
    .task-notes:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }

    /* ── EMPTY STATE ─────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 64px 16px;
      color: var(--text3);
    }
    .empty-icon { font-size: 40px; margin-bottom: 14px; opacity: .35; }
    .empty-state p { font-size: 14px; letter-spacing: .02em; }

    /* ── SNOOZE MENU ─────────────────────────────────────────────────────── */
    .snooze-menu {
      position: fixed;
      z-index: 200;
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow-lg);
      padding: 6px;
      min-width: 220px;
      backdrop-filter: blur(28px);
      animation: menuIn .16s cubic-bezier(.22,1,.36,1);
    }
    [data-theme="dark"]  .snooze-menu { background: rgba(8,12,9,.92); }
    [data-theme="light"] .snooze-menu { background: rgba(250,248,244,.96); }

    @keyframes menuIn {
      from { opacity: 0; transform: scale(.91) translateY(-8px); }
      to   { opacity: 1; transform: scale(1)   translateY(0);    }
    }
    .snooze-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
      transition: background .1s, color .1s;
    }
    .snooze-option:hover { background: var(--green-bg); color: var(--green); }
    .snooze-option .time-label {
      margin-left: auto;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text3);
      font-variant-numeric: tabular-nums;
    }
    .snooze-divider { height: 1px; background: var(--border); margin: 4px 6px; }

    /* ── DIALOG ──────────────────────────────────────────────────────────── */
    .dialog-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
    }
    .dialog {
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 26px;
      width: 320px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(28px);
      animation: dialogIn .22s cubic-bezier(.22,1,.36,1);
    }
    [data-theme="dark"]  .dialog { background: rgba(8,12,9,.95); }
    [data-theme="light"] .dialog { background: rgba(252,250,246,.98); }
    @keyframes dialogIn {
      from { opacity: 0; transform: scale(.88) translateY(12px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }
    .dialog h3 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 16px;
    }
    .dialog input[type="datetime-local"] {
      width: 100%;
      padding: 10px 13px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      margin-bottom: 18px;
      transition: border-color .15s, box-shadow .15s;
    }
    .dialog input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }
    .dialog-footer { display: flex; justify-content: flex-end; gap: 8px; }
    .btn-dialog-cancel {
      padding: 8px 16px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: none;
      color: var(--text2);
      font-size: 12px;
      font-family: inherit;
      letter-spacing: .04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-dialog-cancel:hover { background: var(--surface2); }
    .btn-dialog-confirm {
      padding: 8px 20px;
      border-radius: var(--r-sm);
      border: none;
      background: var(--green);
      color: #050a06;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: .05em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 2px 14px var(--green-glow);
      transition: opacity .15s, transform .1s;
    }
    .btn-dialog-confirm:hover { opacity: .88; }
    .btn-dialog-confirm:active { transform: scale(.95); }

    /* ── TOAST ───────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 22px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      box-shadow: var(--shadow-lg);
      z-index: 500;
      white-space: nowrap;
      animation: toastIn .25s cubic-bezier(.22,1,.36,1);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
    }
    [data-theme="dark"]  .toast { background: rgba(8,12,9,.95); color: var(--green); border-color: rgba(41,217,116,.25); }
    [data-theme="light"] .toast { background: #fff; color: var(--accent); border-color: rgba(255,107,43,.25); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px) scale(.95); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1);   }
    }

    /* ── ANIMATIONS ──────────────────────────────────────────────────────── */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SCROLLBAR ───────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">✓ <span>Daily Tasks</span></div>
      <div class="date-display" id="date-display"></div>
    </div>
    <div class="header-right">
      <div class="stats" id="stats-bar"></div>
      <button class="btn-icon" id="theme-btn" title="Toggle theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="theme-icon">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Meeting Panel -->
  <div class="meeting-panel">
    <button class="meeting-toggle-btn" id="meeting-toggle-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Log Meeting Actions
      <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <div class="meeting-form" id="meeting-form" hidden>
      <input type="text" class="meeting-name-input" id="meeting-name-input" placeholder="Meeting name (e.g. Sprint Planning)" />
      <textarea class="meeting-actions-input" id="meeting-actions-input" placeholder="One action item per line…&#10;&#10;Follow up with design team&#10;Update roadmap doc&#10;Send email to stakeholders"></textarea>
      <div class="meeting-form-footer">
        <button class="btn-cancel" id="meeting-cancel-btn">Cancel</button>
        <button class="btn-submit-meeting" id="meeting-submit-btn">Add Actions</button>
      </div>
    </div>
  </div>

  <!-- Add Task -->
  <div class="add-task-wrap">
    <input type="text" class="add-task-input" id="new-task-input" placeholder="Add a task… (press Enter)" />
    <button class="btn-add" id="add-task-btn" title="Add task">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- Filters -->
  <div class="filters" id="filters"></div>

  <!-- Task List -->
  <div class="task-list" id="task-list"></div>

  <!-- Empty State -->
  <div class="empty-state" id="empty-state" hidden>
    <div class="empty-icon">📋</div>
    <p id="empty-msg">No active tasks — enjoy your moment of calm.</p>
  </div>
</div>

<!-- Snooze Menu -->
<div class="snooze-menu" id="snooze-menu" hidden></div>

<!-- Custom Snooze Dialog -->
<div class="dialog-overlay" id="snooze-dialog" hidden>
  <div class="dialog">
    <h3>💤 Snooze until…</h3>
    <input type="datetime-local" id="snooze-datetime-input" />
    <div class="dialog-footer">
      <button class="btn-dialog-cancel" id="snooze-dialog-cancel">Cancel</button>
      <button class="btn-dialog-confirm" id="snooze-dialog-confirm">Snooze</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
let filter = localStorage.getItem('filter') || 'active';
let theme = localStorage.getItem('theme') || 'dark';
let snoozeTargetId = null;
let expandedIds = new Set();

// ── PERSIST ────────────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem('tasks', JSON.stringify(tasks));
  localStorage.setItem('filter', filter);
  localStorage.setItem('theme', theme);
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatDate(d) {
  return new Date(d).toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
}

function formatSnooze(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = d - now;
  if (diff < 0) return 'Due now';
  const mins = Math.round(diff / 60000);
  if (mins < 60) return `in ${mins}m`;
  const hrs = Math.floor(diff / 3600000);
  const remainMins = Math.round((diff % 3600000) / 60000);
  const today = d.toDateString() === now.toDateString();
  if (today) {
    const hh = d.getHours(), mm = String(d.getMinutes()).padStart(2, '0');
    const ampm = hh >= 12 ? 'pm' : 'am';
    return `today ${hh % 12 || 12}:${mm}${ampm}`;
  }
  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1);
  if (d.toDateString() === tomorrow.toDateString()) {
    const hh = d.getHours(), mm = String(d.getMinutes()).padStart(2, '0');
    const ampm = hh >= 12 ? 'pm' : 'am';
    return `tomorrow ${hh % 12 || 12}:${mm}${ampm}`;
  }
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}

function formatAge(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

function snoozeTime(value) {
  const now = new Date();
  switch (value) {
    case '30m': return new Date(now.getTime() + 30 * 60000).getTime();
    case '1h':  return new Date(now.getTime() + 60 * 60000).getTime();
    case '2h':  return new Date(now.getTime() + 2 * 60 * 60000).getTime();
    case 'afternoon': {
      const t = new Date(now); t.setHours(14, 0, 0, 0);
      return t <= now ? new Date(now.getTime() + 60 * 60000).getTime() : t.getTime();
    }
    case 'eod': {
      const t = new Date(now); t.setHours(18, 0, 0, 0);
      return t <= now ? new Date(now.getTime() + 60 * 60000).getTime() : t.getTime();
    }
    case 'tomorrow9': {
      const t = new Date(now); t.setDate(t.getDate() + 1); t.setHours(9, 0, 0, 0);
      return t.getTime();
    }
    case 'tomorrow14': {
      const t = new Date(now); t.setDate(t.getDate() + 1); t.setHours(14, 0, 0, 0);
      return t.getTime();
    }
    case 'monday': {
      const t = new Date(now);
      const day = t.getDay(); // 0=Sun
      const daysUntilMon = (8 - day) % 7 || 7;
      t.setDate(t.getDate() + daysUntilMon); t.setHours(9, 0, 0, 0);
      return t.getTime();
    }
  }
  return null;
}

// ── TASK OPS ──────────────────────────────────────────────────────────────────
function addTask(text, meetingTag = null) {
  text = text.trim();
  if (!text) return;
  tasks.unshift({ id: uid(), text, notes: '', done: false, snoozedUntil: null, meetingTag, createdAt: Date.now() });
  save();
  render();
}

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  if (t.done) { t.snoozedUntil = null; }
  save();
  render();
  if (t.done) showToast('Task completed ✓');
}

function deleteTask(id) {
  const el = document.querySelector(`.task-item[data-id="${id}"]`);
  if (el) {
    el.classList.add('removing');
    setTimeout(() => {
      tasks = tasks.filter(t => t.id !== id);
      expandedIds.delete(id);
      save();
      render();
    }, 200);
  } else {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }
}

function snoozeTask(id, until) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.snoozedUntil = until;
  t.done = false;
  save();
  render();
  showToast(`Snoozed until ${formatSnooze(until)}`);
}

function updateNotes(id, val) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.notes = val; save(); }
}

function unsnooze(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.snoozedUntil = null; save(); render(); }
}

// ── SNOOZE MENU ────────────────────────────────────────────────────────────────
const snoozeMenuEl = document.getElementById('snooze-menu');
const snoozeDialog = document.getElementById('snooze-dialog');

function buildSnoozeOptions(now = new Date()) {
  const af = new Date(now); af.setHours(14, 0, 0, 0);
  const eod = new Date(now); eod.setHours(18, 0, 0, 0);
  const options = [];
  options.push({ label: 'In 30 minutes', value: '30m', time: `${formatSnooze(snoozeTime('30m'))}` });
  options.push({ label: 'In 1 hour', value: '1h', time: `${formatSnooze(snoozeTime('1h'))}` });
  options.push({ label: 'In 2 hours', value: '2h', time: `${formatSnooze(snoozeTime('2h'))}` });
  if (af > now) options.push({ label: 'This afternoon', value: 'afternoon', time: '2:00 PM' });
  if (eod > now) options.push({ label: 'End of day', value: 'eod', time: '6:00 PM' });
  options.push({ label: '───', value: 'divider' });
  options.push({ label: 'Tomorrow morning', value: 'tomorrow9', time: 'Tomorrow 9 AM' });
  options.push({ label: 'Tomorrow afternoon', value: 'tomorrow14', time: 'Tomorrow 2 PM' });
  const day = now.getDay();
  if (day !== 1) options.push({ label: 'Next Monday', value: 'monday', time: 'Mon 9 AM' });
  options.push({ label: '───', value: 'divider' });
  options.push({ label: 'Custom time…', value: 'custom' });
  return options;
}

function openSnoozeMenu(id, btn) {
  snoozeTargetId = id;
  const options = buildSnoozeOptions();
  snoozeMenuEl.innerHTML = options.map(o => {
    if (o.value === 'divider') return `<div class="snooze-divider"></div>`;
    return `<div class="snooze-option" data-value="${o.value}">
      ${esc(o.label)}
      ${o.time ? `<span class="time-label">${esc(o.time)}</span>` : ''}
    </div>`;
  }).join('');

  const rect = btn.getBoundingClientRect();
  snoozeMenuEl.removeAttribute('hidden');
  const menuH = snoozeMenuEl.offsetHeight;
  const menuW = snoozeMenuEl.offsetWidth;
  let top = rect.bottom + 6;
  let left = rect.right - menuW;
  if (top + menuH > window.innerHeight - 16) top = rect.top - menuH - 6;
  if (left < 8) left = 8;
  snoozeMenuEl.style.top = top + 'px';
  snoozeMenuEl.style.left = left + 'px';
}

function closeSnoozeMenu() {
  snoozeMenuEl.setAttribute('hidden', '');
  snoozeTargetId = null;
}

snoozeMenuEl.addEventListener('click', e => {
  const opt = e.target.closest('.snooze-option');
  if (!opt) return;
  const val = opt.dataset.value;
  if (!val || val === 'divider') return;
  if (val === 'custom') {
    closeSnoozeMenu();
    openCustomSnooze();
    return;
  }
  const until = snoozeTime(val);
  if (until && snoozeTargetId) snoozeTask(snoozeTargetId, until);
  closeSnoozeMenu();
});

// custom snooze
function openCustomSnooze() {
  const now = new Date();
  now.setMinutes(now.getMinutes() + 30);
  document.getElementById('snooze-datetime-input').value = toDatetimeLocal(now);
  snoozeDialog.removeAttribute('hidden');
}
function toDatetimeLocal(d) {
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
document.getElementById('snooze-dialog-cancel').onclick = () => snoozeDialog.setAttribute('hidden', '');
document.getElementById('snooze-dialog-confirm').onclick = () => {
  const val = document.getElementById('snooze-datetime-input').value;
  if (!val) return;
  const until = new Date(val).getTime();
  if (isNaN(until)) return;
  if (snoozeTargetId) snoozeTask(snoozeTargetId, until);
  snoozeDialog.setAttribute('hidden', '');
};

document.addEventListener('click', e => {
  if (!snoozeMenuEl.hidden && !snoozeMenuEl.contains(e.target) && !e.target.closest('.task-btn.snooze')) {
    closeSnoozeMenu();
  }
});

// ── THEME ──────────────────────────────────────────────────────────────────────
function applyTheme() {
  document.documentElement.setAttribute('data-theme', theme);
  const icon = document.getElementById('theme-icon');
  if (theme === 'dark') {
    icon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
  } else {
    icon.innerHTML = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
  }
}
document.getElementById('theme-btn').onclick = () => {
  theme = theme === 'light' ? 'dark' : 'light';
  save();
  applyTheme();
};

// ── MEETING PANEL ─────────────────────────────────────────────────────────────
const meetingForm = document.getElementById('meeting-form');
const meetingToggleBtn = document.getElementById('meeting-toggle-btn');

meetingToggleBtn.onclick = () => {
  const open = !meetingForm.hidden;
  meetingForm.hidden = open;
  meetingToggleBtn.classList.toggle('open', !open);
  if (!open) document.getElementById('meeting-name-input').focus();
};
document.getElementById('meeting-cancel-btn').onclick = () => {
  meetingForm.hidden = true;
  meetingToggleBtn.classList.remove('open');
  document.getElementById('meeting-name-input').value = '';
  document.getElementById('meeting-actions-input').value = '';
};
document.getElementById('meeting-submit-btn').onclick = () => {
  const meetingName = document.getElementById('meeting-name-input').value.trim();
  const lines = document.getElementById('meeting-actions-input').value.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) { showToast('Add at least one action item'); return; }
  lines.forEach(line => addTask(line, meetingName || 'Meeting'));
  document.getElementById('meeting-cancel-btn').click();
  showToast(`${lines.length} action${lines.length > 1 ? 's' : ''} added`);
  if (filter !== 'active') { filter = 'active'; save(); render(); }
};

// ── ADD TASK ──────────────────────────────────────────────────────────────────
const newTaskInput = document.getElementById('new-task-input');
document.getElementById('add-task-btn').onclick = () => {
  addTask(newTaskInput.value);
  newTaskInput.value = '';
  newTaskInput.focus();
};
newTaskInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    addTask(newTaskInput.value);
    newTaskInput.value = '';
  }
});

// ── FILTERS ───────────────────────────────────────────────────────────────────
function getFilteredTasks() {
  const now = Date.now();
  // Wake snoozed tasks
  tasks.forEach(t => {
    if (t.snoozedUntil && t.snoozedUntil <= now && !t.done) t.snoozedUntil = null;
  });

  const active = tasks.filter(t => !t.done && !t.snoozedUntil);
  const snoozed = tasks.filter(t => !t.done && t.snoozedUntil && t.snoozedUntil > now);
  const done = tasks.filter(t => t.done);

  switch (filter) {
    case 'active':  return { shown: active, counts: { active: active.length, snoozed: snoozed.length, done: done.length } };
    case 'snoozed': return { shown: snoozed, counts: { active: active.length, snoozed: snoozed.length, done: done.length } };
    case 'done':    return { shown: done, counts: { active: active.length, snoozed: snoozed.length, done: done.length } };
    case 'all':     return { shown: tasks, counts: { active: active.length, snoozed: snoozed.length, done: done.length } };
  }
}

function renderFilters(counts) {
  const defs = [
    { key: 'active', label: 'Active' },
    { key: 'snoozed', label: 'Snoozed' },
    { key: 'done', label: 'Done' },
    { key: 'all', label: 'All' },
  ];
  document.getElementById('filters').innerHTML = defs.map(d => {
    const cnt = d.key === 'all' ? tasks.length : counts[d.key] ?? 0;
    return `<button class="filter-btn${filter === d.key ? ' active' : ''}" data-filter="${d.key}">
      ${d.label}<span class="filter-count">${cnt}</span>
    </button>`;
  }).join('');
  document.getElementById('filters').querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => { filter = btn.dataset.filter; save(); render(); };
  });
}

function renderStats(counts) {
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = counts.active
    ? `<span class="stat-badge accent">${counts.active} active</span>`
    : `<span class="stat-badge">All clear ✓</span>`;
  if (counts.snoozed) bar.innerHTML += `<span class="stat-badge">💤 ${counts.snoozed}</span>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function taskHTML(t) {
  const isSnoozed = t.snoozedUntil && t.snoozedUntil > Date.now() && !t.done;
  const expanded = expandedIds.has(t.id);
  return `
  <div class="task-item${t.done ? ' is-done' : ''}${isSnoozed ? ' is-snoozed' : ''}" data-id="${t.id}">
    <div class="task-main">
      <button class="task-check" onclick="toggleDone('${t.id}')" title="${t.done ? 'Undo' : 'Complete'}">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="2,6 5,9 10,3"/>
        </svg>
      </button>
      <div class="task-body">
        <div class="task-top">
          <span class="task-text">${esc(t.text)}</span>
          ${t.meetingTag ? `<span class="tag tag-meeting">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            ${esc(t.meetingTag)}</span>` : ''}
          ${isSnoozed ? `<span class="tag tag-snooze">💤 ${esc(formatSnooze(t.snoozedUntil))}</span>` : ''}
        </div>
        <div class="task-meta">${formatAge(t.createdAt)}${t.notes ? ' · has notes' : ''}</div>
      </div>
      <div class="task-actions">
        ${isSnoozed ? `<button class="task-btn snooze" onclick="unsnooze('${t.id}')" title="Wake up now">▶</button>` : ''}
        <button class="task-btn snooze" onclick="openSnoozeMenu('${t.id}', this)" title="Snooze">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
        <button class="task-btn${expanded ? ' active' : ''}" onclick="toggleExpand('${t.id}')" title="Notes">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button class="task-btn delete" onclick="deleteTask('${t.id}')" title="Delete">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </div>
    ${expanded ? `
    <div class="task-notes-wrap">
      <textarea class="task-notes" placeholder="Add notes, links, or context…" oninput="updateNotes('${t.id}', this.value)">${esc(t.notes || '')}</textarea>
    </div>` : ''}
  </div>`;
}

function toggleExpand(id) {
  if (expandedIds.has(id)) expandedIds.delete(id);
  else expandedIds.add(id);
  render();
}

function render() {
  document.getElementById('date-display').textContent = formatDate(Date.now());
  const { shown, counts } = getFilteredTasks();
  renderFilters(counts);
  renderStats(counts);

  const list = document.getElementById('task-list');
  const emptyState = document.getElementById('empty-state');
  const emptyMsg = document.getElementById('empty-msg');

  if (!shown.length) {
    list.innerHTML = '';
    emptyState.removeAttribute('hidden');
    const msgs = {
      active: 'No active tasks — enjoy your moment of calm.',
      snoozed: 'Nothing is snoozed right now.',
      done: 'No completed tasks yet.',
      all: 'No tasks yet. Add one above!',
    };
    emptyMsg.textContent = msgs[filter] || '';
  } else {
    emptyState.setAttribute('hidden', '');
    list.innerHTML = shown.map(taskHTML).join('');
  }
}

// ── TOAST ──────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  let t = document.querySelector('.toast');
  if (!t) { t = document.createElement('div'); t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  toastTimer = setTimeout(() => t.remove(), 2600);
}

// ── SNOOZE WATCHER ────────────────────────────────────────────────────────────
setInterval(() => {
  const now = Date.now();
  let changed = false;
  tasks.forEach(t => {
    if (t.snoozedUntil && t.snoozedUntil <= now && !t.done) {
      t.snoozedUntil = null;
      changed = true;
    }
  });
  if (changed) { save(); render(); showToast('A snoozed task is back!'); }
}, 30000);

// ── INIT ──────────────────────────────────────────────────────────────────────
applyTheme();
render();
</script>
</body>
</html>
