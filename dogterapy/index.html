<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DogTerapy</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0906;
      --bg2:      #110e0a;
      --border:   rgba(201,169,110,0.12);
      --border-h: rgba(201,169,110,0.35);
      --gold:     #c9a96e;
      --gold-dim: rgba(201,169,110,0.4);
      --text:     #ede5d8;
      --text-dim: rgba(237,229,216,0.4);
      --text-mid: rgba(237,229,216,0.65);
      --warm:     #f5ede0;
      --glow:     rgba(201,169,110,0.07);
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 24px 100px;
      line-height: 1.7;
      /* warm ambient glow from center */
      background-image:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(201,169,110,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 50% 100%, rgba(120,80,30,0.04) 0%, transparent 60%);
    }

    /* ── BACK ── */
    .back-link {
      position: fixed;
      top: 22px;
      left: 24px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fade-in 1s ease both;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 14px;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 6vw, 4.4rem);
      color: var(--warm);
      letter-spacing: 0.06em;
      line-height: 1;
    }

    .rule {
      width: 1px;
      height: 32px;
      background: linear-gradient(to bottom, transparent, var(--gold-dim), transparent);
      margin: 22px auto;
    }

    header p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--text-dim);
    }

    /* ── DOG ── */
    .dog-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 56px;
      animation: fade-up 1s ease 0.2s both;
    }

    .dog-wrap {
      position: relative;
      display: inline-block;
    }

    /* warm halo behind the dog */
    .dog-wrap::before {
      content: '';
      position: absolute;
      inset: -20px;
      background: radial-gradient(ellipse at 50% 60%, rgba(201,169,110,0.12) 0%, transparent 70%);
      border-radius: 50%;
      animation: halo-pulse 4s ease-in-out infinite;
    }

    @keyframes halo-pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.06); }
    }

    img#dog {
      display: block;
      width: 240px;
      height: auto;
      position: relative;
      z-index: 1;
    }

    /* ── QUOTE ── */
    .quote-wrap {
      margin-top: 32px;
      max-width: 400px;
      text-align: center;
      position: relative;
    }

    .quote {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--text-mid);
      line-height: 1.6;
      min-height: 3.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease;
    }

    /* ── INPUT AREA ── */
    .compose {
      width: 100%;
      max-width: 560px;
      animation: fade-up 1s ease 0.35s both;
    }

    .compose-inner {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.4s, box-shadow 0.4s;
      background: var(--bg2);
    }

    .compose-inner:focus-within {
      border-color: var(--border-h);
      box-shadow: 0 0 0 4px rgba(201,169,110,0.05), 0 8px 40px rgba(201,169,110,0.06);
    }

    textarea {
      width: 100%;
      min-height: 140px;
      background: transparent;
      border: none;
      padding: 22px 24px 16px;
      font-size: 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      color: var(--warm);
      resize: none;
      outline: none;
      letter-spacing: 0.01em;
      line-height: 1.75;
    }

    textarea::placeholder {
      color: rgba(201,169,110,0.25);
      font-style: italic;
    }

    .compose-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 14px 20px;
      border-top: 1px solid var(--border);
    }

    .compose-hint {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .compose-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* MIC */
    .mic-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.25s, background 0.25s;
      flex-shrink: 0;
    }
    .mic-btn:hover { border-color: var(--gold-dim); background: var(--glow); }
    .mic-btn.listening {
      border-color: var(--gold);
      background: var(--glow);
      animation: breathe 2s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 0 0   rgba(201,169,110,0.25); }
      50%       { box-shadow: 0 0 0 8px rgba(201,169,110,0); }
    }
    .mic-btn svg { pointer-events: none; }

    /* SEND */
    .send-btn {
      padding: 10px 22px;
      background: transparent;
      border: 1px solid var(--gold-dim);
      border-radius: 4px;
      color: var(--gold);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      letter-spacing: 0.18em;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.25s, border-color 0.25s, color 0.25s;
    }
    .send-btn:hover {
      background: rgba(201,169,110,0.08);
      border-color: var(--gold);
      color: var(--warm);
    }
    .send-btn:active { transform: scale(0.97); }

    /* ── THINKING ── */
    .thinking {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 22px 24px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .thinking.visible { opacity: 1; }
    .thinking span {
      width: 5px;
      height: 5px;
      background: var(--gold-dim);
      border-radius: 50%;
      animation: dot-pulse 1.4s ease-in-out infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1; }
    }

    /* ── LOG ── */
    .log {
      width: 100%;
      max-width: 560px;
      margin-top: 12px;
      display: flex;
      flex-direction: column;
    }

    .log-entry {
      padding: 22px 24px;
      font-size: 0.97rem;
      line-height: 1.8;
      animation: entry-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      border-bottom: 1px solid var(--border);
    }

    @keyframes entry-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }

    .log-entry.user {
      color: var(--text-mid);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
    }

    .log-entry.dog {
      color: var(--text);
      background: linear-gradient(90deg, rgba(201,169,110,0.03) 0%, transparent 100%);
      border-left: 1px solid var(--gold-dim);
    }

    .log-entry .who {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .log-entry.user .who { color: var(--text-dim); }
    .log-entry.dog  .who { color: var(--gold); }

    /* ── FOOTER ── */
    footer {
      margin-top: 80px;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(201,169,110,0.15);
      text-align: center;
    }

    /* ── ANIMATIONS ── */
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>

<a href="/" class="back-link">← Back</a>

<header>
  <div class="wordmark">Private Practice &nbsp;·&nbsp; Always Open</div>
  <h1>DogTerapy</h1>
  <div class="rule"></div>
  <p>A quiet space. No judgment. Just presence.</p>
</header>

<div class="dog-section">
  <div class="dog-wrap">
    <img id="dog" src="https://www.krea.ai/api/img?f=webp&i=https%3A%2F%2Fapp-uploads.krea.ai%2Fpublic%2Fae709f7c-3131-4d38-a5e7-6a9c0e95ab0c-image.png" alt="Your therapist" />
  </div>
  <div class="quote-wrap">
    <p class="quote" id="quote">I'm here. Take your time.</p>
  </div>
</div>

<div class="compose">
  <div class="compose-inner">
    <textarea id="input" rows="5" placeholder="Start with whatever is on your mind right now…"></textarea>
    <div class="compose-footer">
      <span class="compose-hint" id="hint">⌘ + Enter to share</span>
      <div class="compose-actions">
        <button class="mic-btn" id="micBtn" title="Speak instead">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="2" width="6" height="11" rx="3" fill="currentColor" style="color:var(--gold)"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="var(--gold)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <line x1="12" y1="17" x2="12" y2="21" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="8"  y1="21" x2="16" y2="21" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="send-btn" id="sendBtn">Share</button>
      </div>
    </div>
  </div>

  <div class="thinking" id="thinking">
    <span></span><span></span><span></span>
  </div>
</div>

<div class="log" id="log"></div>

<footer>All sessions are confidential &nbsp;·&nbsp; DogTerapy</footer>

<script>
  const responses = [
    "What you're describing sounds genuinely difficult. You don't have to make sense of it all at once.",
    "I notice you're carrying quite a bit right now. What feels heaviest?",
    "That's a meaningful thing to put into words. How long have you been holding that?",
    "There's no rush here. We can sit with that for a moment.",
    "It makes complete sense that you'd feel that way. Tell me more, if you'd like.",
    "You came here today. That alone is not a small thing.",
    "I'm holding what you just said carefully. You didn't need to share it — but I'm glad you did.",
    "What would it feel like to let some of that go? Even just a little.",
    "You don't need to have the answers. That's what we're here to figure out, together.",
    "I hear you. And I want you to know — none of this is too much.",
    "Sometimes the hardest part is just admitting it's hard. You just did that.",
    "What would you say to someone you love who felt exactly this way?",
    "That sounds exhausting. How long have you been carrying it on your own?",
    "Let's stay there for a moment. Don't move past it too quickly.",
    "What do you need most right now — to be understood, or to find a way forward?",
    "You're being very honest with yourself. That takes courage.",
    "It's okay if this doesn't resolve today. Some things need time to unfold.",
    "I'm not going anywhere. There's no session limit here.",
    "What does that feel like in your body when you think about it?",
    "You matter. Whatever brought you here today — you were right to come.",
  ];

  const idleQuotes = [
    "I'm here. Take your time.",
    "Whatever you bring, I can hold it.",
    "There's nothing you need to perform for me.",
    "This is a safe space. Completely.",
    "You don't have to have the right words.",
    "Start anywhere. I'll follow.",
  ];

  let respIdx = 0;
  let quoteIdx = 0;
  let quoteInterval;
  const quoteEl  = document.getElementById('quote');
  const thinkEl  = document.getElementById('thinking');
  const log      = document.getElementById('log');
  const input    = document.getElementById('input');

  function cycleQuote() {
    quoteEl.style.opacity = '0';
    setTimeout(() => {
      quoteIdx = (quoteIdx + 1) % idleQuotes.length;
      quoteEl.textContent = idleQuotes[quoteIdx];
      quoteEl.style.opacity = '1';
    }, 600);
  }

  quoteInterval = setInterval(cycleQuote, 7000);

  function setQuote(text) {
    clearInterval(quoteInterval);
    quoteEl.style.opacity = '0';
    setTimeout(() => {
      quoteEl.textContent = text.length > 90 ? text.slice(0, 88) + '…' : text;
      quoteEl.style.opacity = '1';
    }, 600);
    // restart cycling after a while
    setTimeout(() => { quoteInterval = setInterval(cycleQuote, 7000); }, 12000);
  }

  function addEntry(who, text) {
    const el = document.createElement('div');
    el.className = `log-entry ${who}`;
    const label = who === 'user' ? 'You' : 'Your Therapist';
    el.innerHTML = `<div class="who">${label}</div>${text}`;
    // newest entries on top
    log.insertBefore(el, log.firstChild);
  }

  function handleSubmit() {
    const text = input.value.trim();
    if (!text) return;

    addEntry('user', text);
    input.value = '';
    input.focus();

    // show thinking
    thinkEl.classList.add('visible');
    document.getElementById('hint').textContent = 'listening…';

    const delay = 1200 + Math.random() * 900;
    setTimeout(() => {
      thinkEl.classList.remove('visible');
      document.getElementById('hint').textContent = '⌘ + Enter to share';

      const resp = responses[respIdx % responses.length];
      respIdx++;
      addEntry('dog', resp);
      setQuote(resp);
    }, delay);
  }

  document.getElementById('sendBtn').addEventListener('click', handleSubmit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) handleSubmit();
  });

  // auto-grow textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.max(140, input.scrollHeight) + 'px';
  });

  // ── SPEECH ──
  const micBtn   = document.getElementById('micBtn');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    micBtn.style.opacity = '0.25';
    micBtn.style.cursor = 'not-allowed';
  } else {
    const recog = new SR();
    recog.continuous = false;
    recog.interimResults = true;
    recog.lang = 'en-US';

    let listening = false;
    let finalT = '';

    micBtn.addEventListener('click', () => {
      listening ? recog.stop() : (finalT = input.value, recog.start());
    });

    recog.addEventListener('start', () => {
      listening = true;
      micBtn.classList.add('listening');
    });

    recog.addEventListener('result', e => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        e.results[i].isFinal
          ? finalT += e.results[i][0].transcript + ' '
          : interim += e.results[i][0].transcript;
      }
      input.value = finalT + interim;
      input.dispatchEvent(new Event('input'));
    });

    recog.addEventListener('end', () => {
      listening = false;
      micBtn.classList.remove('listening');
      input.value = finalT.trim();
    });

    recog.addEventListener('error', () => {
      listening = false;
      micBtn.classList.remove('listening');
    });
  }
</script>
</body>
</html>
